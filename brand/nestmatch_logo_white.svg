<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#ffffff"/>
  <g transform="translate(400, 100)">

    <!-- Diamond: rotated square, half-diagonal ~28px so tips at ±28 vertically -->
    <!-- This makes the diamond just slightly taller than the cap height (~26px) -->
    <rect x="-20" y="-20" width="40" height="40" rx="2"
      transform="rotate(45)"
      fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
    <!-- Inner square -->
    <rect x="-11" y="-11" width="22" height="22" rx="1"
      fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
    <!-- Centre dot -->
    <circle cx="0" cy="0" r="2.5" fill="#1a1a1a"/>

    <!-- Nest — tight to left diamond tip -->
    <text text-anchor="end" x="-30" y="9"
      font-family="Georgia, 'Times New Roman', serif"
      font-weight="400" font-size="26" letter-spacing="0.5"
      fill="#1a1a1a">Nest</text>

    <!-- Match — tight to right diamond tip -->
    <text text-anchor="start" x="30" y="9"
      font-family="Georgia, 'Times New Roman', serif"
      font-weight="400" font-size="26" letter-spacing="0.5"
      fill="#1a1a1a">Match</text>

  </g>
</svg>
